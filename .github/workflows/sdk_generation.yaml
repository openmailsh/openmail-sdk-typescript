name: Generate SDK

permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force SDK generation, even if no changes are detected.
        type: boolean
        default: false
      set_version:
        description: Override the SDK version
        type: string
  # Fallback safety net: the primary trigger is the private API repo firing
  # workflow_dispatch on every openapi.json change (see its ci.yml
  # notify-sdk-repo job). Since this repo's source is a remote URL rather
  # than a local file, there's no push-to-this-repo event to trigger on —
  # if that cross-repo dispatch ever fails silently, this daily poll is
  # what catches drift instead of it going unnoticed indefinitely.
  schedule:
    - cron: "0 0 * * *"

jobs:
  generate:
    uses: speakeasy-api/sdk-generation-action/.github/workflows/workflow-executor.yaml@v15
    with:
      speakeasy_version: latest
      force: ${{ github.event.inputs.force || false }}
      mode: pr
      set_version: ${{ github.event.inputs.set_version || '' }}
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}
