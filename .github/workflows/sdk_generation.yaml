name: Generate SDK

permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write

on:
  # Primary trigger: the private API repo's CI publishes the updated spec to the
  # Speakeasy registry and then dispatches this workflow (see that repo's ci.yml
  # sync-sdk-spec job). This repo's source is the registry — nothing spec-related
  # is committed here — so there's no in-repo file change to trigger on; the
  # dispatch is the signal.
  workflow_dispatch:
    inputs:
      force:
        description: Force SDK generation, even if no changes are detected.
        type: boolean
        default: false
      set_version:
        description: Override the SDK version
        type: string
  # Backstop: catches drift if the cross-repo dispatch ever fails silently.
  schedule:
    - cron: "0 0 * * *"

jobs:
  generate:
    uses: speakeasy-api/sdk-generation-action/.github/workflows/workflow-executor.yaml@v15
    with:
      speakeasy_version: latest
      force: ${{ github.event.inputs.force || false }}
      mode: pr
      set_version: ${{ github.event.inputs.set_version || '' }}
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}
