name: Generate SDK

permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write

on:
  # Primary trigger: the private API repo's CI commits an updated openapi.json
  # into this repo whenever its canonical spec changes on main (see that repo's
  # ci.yml notify-sdk-repo job). That push fires generation against the exact,
  # committed spec — no race against the API's production deploy.
  push:
    branches: [main]
    paths:
      - openapi.json
      - .speakeasy/gen.yaml
      - .speakeasy/sdk-generation-overlay.yaml
  workflow_dispatch:
    inputs:
      force:
        description: Force SDK generation, even if no changes are detected.
        type: boolean
        default: false
      set_version:
        description: Override the SDK version
        type: string
  # Backstop: catches drift if the cross-repo spec sync ever fails silently.
  schedule:
    - cron: "0 0 * * *"

jobs:
  generate:
    uses: speakeasy-api/sdk-generation-action/.github/workflows/workflow-executor.yaml@v15
    with:
      speakeasy_version: latest
      force: ${{ github.event.inputs.force || false }}
      mode: pr
      set_version: ${{ github.event.inputs.set_version || '' }}
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}
