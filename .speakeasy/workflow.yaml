workflowVersion: 1.0.0
speakeasyVersion: latest
sources:
    OpenMail API:
        inputs:
            - location: https://api.openmail.sh/openapi.json
        overlays:
            - location: .speakeasy/sdk-generation-overlay.yaml
        output: .speakeasy/out.openapi.yaml
        registry:
            location: registry.speakeasyapi.dev/openmail/openmail-specs/open-mail-api
targets:
    openmail-sdk:
        target: typescript
        source: OpenMail API
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/openmail/openmail-specs/open-mail-api-typescript-code-samples
            labelOverride:
                fixedValue: Typescript (SDK)
            blocking: false
