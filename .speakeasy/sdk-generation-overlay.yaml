overlay: 1.0.0
info:
    title: SDK Generation Overlay
    version: 1.0.0
actions:
    - target: "$"
      update:
        x-speakeasy-retries:
            strategy: backoff
            backoff:
                initialInterval: 500
                maxInterval: 60000
                maxElapsedTime: 3600000
                exponent: 1.5
            statusCodes: ["5XX", "429"]
            retryConnectionErrors: true
    - target: "$.paths['/v1/pods'].get"
      update:
        x-speakeasy-pagination:
            type: offsetLimit
            inputs:
                - name: offset
                  in: parameters
                  type: offset
                - name: limit
                  in: parameters
                  type: limit
            outputs:
                results: $.data
    - target: "$.paths['/v1/inboxes'].get"
      update:
        x-speakeasy-pagination:
            type: offsetLimit
            inputs:
                - name: offset
                  in: parameters
                  type: offset
                - name: limit
                  in: parameters
                  type: limit
            outputs:
                results: $.data
    - target: "$.paths['/v1/inboxes/{id}/messages'].get"
      update:
        x-speakeasy-pagination:
            type: offsetLimit
            inputs:
                - name: offset
                  in: parameters
                  type: offset
                - name: limit
                  in: parameters
                  type: limit
            outputs:
                results: $.data
    - target: "$.paths['/v1/inboxes/{id}/threads'].get"
      update:
        x-speakeasy-pagination:
            type: offsetLimit
            inputs:
                - name: offset
                  in: parameters
                  type: offset
                - name: limit
                  in: parameters
                  type: limit
            outputs:
                results: $.data
